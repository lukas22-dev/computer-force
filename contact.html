<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Contact</title>

    <link rel="stylesheet" href="style.css" />

    <link
      href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=Archivo+Black&family=Playfair+Display&display=swap"
      rel="stylesheet"
    />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body class="contactPage">
    <nav class="navbar navbar-expand-lg navbar-dark">
      <div class="container">
        <a class="navbar-brand" href="index.html">Cozy Cafe</a>

        <div class="navbar-nav">
          <a class="nav-link" href="index.html">Home</a>
          <a class="nav-link" href="menu.html">Menu</a>
          <a class="nav-link" href="about.html">About</a>
          <a class="nav-link" href="contact.html">Contact</a>
        </div>
      </div>
    </nav>

    <div class="container">
      <h1 class="text-center">Contact Us</h1>

      <div class="row mt-4">
        <div class="col-md-6">
          <h3>Our Cafe</h3>

          <p>Cozy Cafe</p>
          <p>Sydney, Australia</p>
          <p>Email: info@cozycafe.au</p>
          <p>Phone: +61411941707</p>
        </div>

        <div class="col-md-6">
          <h3>Send us a message</h3>

          <form>
            <label>Name</label>
            <input type="text" class="form-control" />

            <br />

            <label>Email</label>
            <input type="email" class="form-control" />

            <br />

            <label>Message</label>
            <textarea class="form-control"></textarea>

            <br />

            <button class="btn btn-dark">Send</button>
          </form>
        </div>
      </div>
    </div>
  </body>
</html>
